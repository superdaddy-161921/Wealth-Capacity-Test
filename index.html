<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>부의 그릇 테스트 | 성공을 디자인하라</title>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KJNV6DHSGC"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-KJNV6DHSGC');</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&display=swap');
:root{
  --navy:#1B2A4A;--navy-light:#2C3E5F;
  --gold:#B8860B;--gold-hover:#D4A017;--gold-subtle:rgba(184,134,11,0.08);
  --warm-bg:#F7F6F3;--warm-bg-deep:#EFEDE8;--card:#FFFFFF;
  --text:#1F2937;--text-sub:#6B7280;--text-light:#9CA3AF;
  --border:#E8E6E1;--border-light:#F0EEEA;
  --shadow:0 2px 16px rgba(31,41,55,0.06);--shadow-lg:0 6px 32px rgba(31,41,55,0.1);
  --radius:18px;--radius-sm:12px;
  --neu-bg:#EEECE7;--neu-light:rgba(255,255,255,0.8);--neu-dark:rgba(174,170,162,0.35);
  --type-a:#C44040;--type-a-bg:#FDF0EF;--type-a-line:#E8A5A5;
  --type-b:#B8750A;--type-b-bg:#FDF5E8;--type-b-line:#E0C17A;
  --type-c:#6558D3;--type-c-bg:#F2F0FE;--type-c-line:#B5AFEC;
  --type-d:#148A5E;--type-d-bg:#EDF9F3;--type-d-line:#82CDAA;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--warm-bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
.container{max-width:560px;margin:0 auto;padding:16px}
.accent-line{width:48px;height:3px;background:var(--gold);border-radius:2px;margin:0 auto 28px}

/* ===== INTRO ===== */
.intro-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--warm-bg);padding:48px 20px;position:relative}
.intro{text-align:center;position:relative;max-width:480px}
.intro .badge{display:inline-block;background:var(--navy);color:#fff;font-size:10px;font-weight:600;padding:5px 14px;border-radius:6px;margin-bottom:28px;letter-spacing:1.5px;text-transform:uppercase}
.intro h1{font-family:'Playfair Display','Noto Sans KR',serif;font-size:27px;font-weight:900;line-height:1.5;margin-bottom:24px;color:var(--navy)}
.intro h1 em{font-style:normal;color:var(--gold)}
.intro .hook-text{font-size:15.5px;color:var(--text-sub);line-height:1.9;margin-bottom:24px;text-align:center;font-weight:400}
.intro .hook-text strong{color:var(--text);font-weight:600}
.intro .stats{display:flex;gap:12px;justify-content:center;margin:24px 0;flex-wrap:wrap}
.intro .stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 20px;text-align:center;min-width:100px;box-shadow:var(--shadow)}
.intro .stat .num{font-size:22px;font-weight:700;color:var(--navy)}
.intro .stat .label{font-size:10px;color:var(--text-light);margin-top:4px;letter-spacing:0.3px}
.intro .social-proof{font-size:12px;color:var(--text-light);margin:20px 0 8px;line-height:1.6}
.btn-start{display:inline-block;background:var(--gold);color:#fff;border:none;padding:18px 52px;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;margin-top:28px;transition:all .25s;font-family:inherit;letter-spacing:0.3px;box-shadow:0 4px 16px rgba(184,134,11,0.25)}
.btn-start:hover{background:var(--gold-hover);transform:translateY(-2px);box-shadow:0 6px 24px rgba(184,134,11,0.35)}
.btn-start:active{transform:scale(0.97)}
.intro .time-info{font-size:11px;color:var(--text-light);margin-top:14px;letter-spacing:0.3px}

/* ===== PROGRESS ===== */
.quiz-header{padding:20px 0 8px;text-align:center}
.progress-text{font-size:13px;color:var(--text-sub);margin-bottom:10px;font-weight:500}
.progress-bar{background:var(--border);height:4px;border-radius:2px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}

/* ===== QUESTION CARD ===== */
.question-card{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius);padding:32px 24px;box-shadow:var(--shadow);animation:slideInRight .35s cubic-bezier(.25,.8,.25,1)}
@keyframes slideInRight{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOutLeft{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-50px)}}
.question-card.exiting{animation:slideOutLeft .22s cubic-bezier(.4,0,1,1) forwards}
.q-number{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:20px;text-align:center;letter-spacing:2px}
.q-statement{font-size:16px;font-weight:600;line-height:1.65;color:var(--text);text-align:center;margin-bottom:32px;padding:0 4px;word-break:keep-all}

/* ===== BIPOLAR SELECTOR ===== */
.bipolar-area{margin-bottom:24px}
.bipolar-labels{display:flex;justify-content:space-between;gap:12px;margin-bottom:20px}
.bipolar-label{flex:1;font-size:12.5px;line-height:1.55;color:var(--text-sub);padding:14px 10px;background:var(--warm-bg);border-radius:var(--radius-sm);text-align:center;transition:all .25s;border:1.5px solid transparent;font-weight:400;word-break:keep-all}
.bipolar-label.active-l{border-color:var(--navy);background:rgba(27,42,74,0.06);color:var(--navy);font-weight:500;transform:scale(1.02)}
.bipolar-label.active-r{border-color:var(--gold);background:var(--gold-subtle);color:#7A5A00;font-weight:500;transform:scale(1.02)}
.selector-row{display:flex;align-items:center;gap:0;justify-content:center;margin-bottom:8px}
.neu-btn{width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;background:var(--neu-bg);box-shadow:3px 3px 8px var(--neu-dark),-3px -3px 8px var(--neu-light);transition:all .2s cubic-bezier(.4,0,.2,1);position:relative;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;overflow:hidden}
.neu-btn:active{box-shadow:inset 2px 2px 5px var(--neu-dark),inset -2px -2px 5px var(--neu-light)}
.neu-btn .dot{width:0;height:0;border-radius:50%;transition:all .25s cubic-bezier(.4,0,.2,1);background:var(--navy)}
.neu-btn.selected{box-shadow:inset 2px 2px 5px var(--neu-dark),inset -2px -2px 5px var(--neu-light)}
.neu-btn.selected .dot{width:18px;height:18px}
.neu-btn.right-side .dot{background:var(--gold)}
.neu-btn.center-neu{width:38px;height:38px}
.neu-btn.center-neu .dot{background:var(--text-light)}
.neu-btn.size-lg{width:52px;height:52px}
.neu-btn.size-lg.selected .dot{width:24px;height:24px}
.neu-btn .ripple{position:absolute;border-radius:50%;background:rgba(27,42,74,0.12);transform:scale(0);animation:rippleAnim .5s ease-out}
.neu-btn.right-side .ripple{background:rgba(184,134,11,0.12)}
@keyframes rippleAnim{to{transform:scale(3);opacity:0}}
.selector-line{width:12px;height:2px;background:var(--border);flex-shrink:0}
.selector-ticks{display:flex;justify-content:space-between;padding:0;margin-top:6px}
.selector-tick{font-size:9px;color:var(--text-light);text-align:center;flex:1}
.btn-next{display:block;width:100%;background:var(--navy);color:#fff;border:none;padding:16px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;margin-top:24px;transition:all .3s;font-family:inherit;opacity:.2;pointer-events:none}
.btn-next.active{opacity:1;pointer-events:auto;background:var(--gold);box-shadow:0 3px 12px rgba(184,134,11,0.2)}
.btn-next.active:hover{background:var(--gold-hover);transform:translateY(-1px)}
.btn-next:active{transform:scale(0.97)}

/* ===== INSIGHT BREAK ===== */
.insight-card{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius);padding:36px 24px;box-shadow:var(--shadow);text-align:center;animation:slideInRight .35s ease}
.insight-icon{font-size:36px;margin-bottom:20px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.insight-title{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:14px;line-height:1.5}
.insight-text{font-size:14px;color:var(--text-sub);line-height:1.85;margin-bottom:24px;text-align:left}
.insight-text strong{color:var(--navy)}
.insight-source{font-size:11px;color:var(--text-light);text-align:right;margin-bottom:24px}
.btn-continue{display:block;width:100%;background:var(--gold);color:#fff;border:none;padding:16px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-continue:hover{background:var(--gold-hover)}

/* ===== LOADING ===== */
.loading{text-align:center;padding:100px 20px}
.loading-ring{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 28px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:15px;color:var(--text-sub);line-height:1.6;font-weight:500}
.loading .loading-steps{margin-top:24px;text-align:left;max-width:260px;margin-left:auto;margin-right:auto}
.loading .step{font-size:13px;color:var(--text-light);padding:8px 0;opacity:0;animation:stepIn .4s ease forwards;display:flex;align-items:center;gap:8px}
.loading .step::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .3s}
.loading .step.active{color:var(--gold);font-weight:500}
.loading .step.active::before{background:var(--gold)}
@keyframes stepIn{to{opacity:1}}

/* ===== RESULT ===== */
.result-card{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius);padding:0;box-shadow:var(--shadow-lg);overflow:hidden}
.result-hero{padding:36px 24px 28px;text-align:center;background:var(--card);position:relative;animation:fadeDown .5s ease}
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
.result-hero::after{content:'';position:absolute;bottom:0;left:24px;right:24px;height:1px;background:var(--border)}
.result-type-badge{display:inline-block;padding:5px 16px;border-radius:6px;font-size:11px;font-weight:700;margin-bottom:14px;letter-spacing:1px}
.result-type-name{font-family:'Playfair Display','Noto Sans KR',serif;font-size:26px;font-weight:900;margin-bottom:8px}
.result-subtitle{font-size:13px;color:var(--text-sub);line-height:1.55}
.result-oneliner{margin-top:16px;padding:12px 16px;background:var(--warm-bg);border-radius:10px;font-size:13.5px;font-weight:500;color:var(--navy);line-height:1.55;border:1px solid var(--border-light)}
.reveal-section{opacity:0;transform:translateY(24px);transition:all .5s cubic-bezier(.4,0,.2,1)}
.reveal-section.visible{opacity:1;transform:translateY(0)}
.result-body{padding:28px 24px}
.result-meter{margin-bottom:28px}
.meter-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.meter-label{font-size:11px;font-weight:500;width:76px;text-align:right;flex-shrink:0}
.meter-bar{flex:1;height:8px;background:var(--warm-bg-deep);border-radius:4px;overflow:hidden}
.meter-fill{height:100%;border-radius:4px;width:0;transition:width 1s cubic-bezier(.4,0,.2,1)}
.meter-pct{font-size:11px;font-weight:700;width:36px;flex-shrink:0}
.result-section{margin-bottom:28px}
.result-section-title{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:12px;padding-bottom:8px;border-bottom:1.5px solid var(--border-light);letter-spacing:1px;text-transform:uppercase}
.result-section-body{font-size:14px;line-height:1.85;color:#4B5563}
.result-section-body p{margin-bottom:14px}
.mindset-box{background:var(--warm-bg);border-radius:var(--radius-sm);padding:20px;margin:16px 0;border-left:3px solid var(--navy)}
.mindset-box .label{font-size:10px;font-weight:700;color:var(--navy);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
.mindset-box .current{font-size:13px;color:var(--text-light);margin-bottom:6px;text-decoration:line-through}
.mindset-box .new{font-size:14px;color:var(--navy);font-weight:600}
.story-box{background:#FFFBF7;border-radius:var(--radius-sm);padding:20px;margin:16px 0;border-left:3px solid var(--type-b)}
.story-box .label{font-size:10px;font-weight:700;color:var(--type-b);margin-bottom:10px;letter-spacing:1px;text-transform:uppercase}
.story-box .text{font-size:13.5px;color:#6B5D4A;line-height:1.8}
.book-box{background:var(--gold-subtle);border-radius:var(--radius-sm);padding:20px;margin:16px 0;border-left:3px solid var(--gold)}
.book-box .label{font-size:10px;font-weight:700;color:var(--gold);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
.book-box .book-name{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px}
.book-box .book-reason{font-size:13px;color:#4B5563;line-height:1.7}
.book-box .book-next{font-size:12px;color:var(--text-light);margin-top:10px}
.solution-box{background:var(--warm-bg);border-radius:var(--radius-sm);padding:20px;border-left:3px solid var(--gold)}
.solution-box .sol-label{font-size:10px;font-weight:700;color:var(--gold);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
.solution-box .sol-name{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:10px}
.solution-box .sol-reason{font-size:13.5px;color:#4B5563;line-height:1.75;margin-bottom:10px}
.solution-box .sol-detail{font-size:11px;color:var(--text-light)}
.result-cta{padding:28px 24px 36px;text-align:center;background:var(--warm-bg);border-top:1px solid var(--border-light)}
.result-cta h3{font-size:16px;font-weight:700;margin-bottom:12px;color:var(--navy);line-height:1.5}
.btn-cta{display:inline-block;background:var(--gold);color:#fff;border:none;padding:17px 44px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;transition:all .25s;font-family:inherit;text-decoration:none;box-shadow:0 3px 16px rgba(184,134,11,0.25)}
.btn-cta:hover{background:var(--gold-hover);transform:translateY(-1px);box-shadow:0 5px 24px rgba(184,134,11,0.3)}
.btn-cta:active{transform:scale(0.97)}
.share-box{background:var(--card);border-radius:var(--radius-sm);padding:18px 20px;margin-top:18px;border:1px solid var(--border)}
.share-box .share-prompt{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:8px;line-height:1.4}
.btn-share{display:inline-block;background:var(--card);color:var(--navy);border:1.5px solid var(--border);padding:11px 28px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-share:hover{background:var(--warm-bg);border-color:var(--navy)}
.mid-story-cta{padding:24px 20px;margin:0 16px 16px;background:linear-gradient(135deg,#1B2A4A 0%,#2a3d5f 100%);border-radius:12px;text-align:center}
.mid-story-cta .mid-label{font-size:11px;color:var(--gold);font-weight:600;letter-spacing:1px;margin-bottom:8px}
.mid-story-cta .mid-title{font-size:15px;font-weight:700;color:#fff;line-height:1.5;margin-bottom:6px}
.mid-story-cta .mid-desc{font-size:12px;color:rgba(255,255,255,0.6);line-height:1.6;margin-bottom:14px}
.mid-story-cta .mid-link{display:inline-block;padding:10px 24px;background:var(--gold);color:#fff;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none}
.result-footer{padding:20px 24px;font-size:10px;color:var(--text-light);text-align:center;line-height:1.7}

/* TYPE COLORS */
.type-spender .result-type-badge{background:var(--type-a-bg);color:var(--type-a)}
.type-spender .result-type-name{color:var(--type-a)}
.type-spender .result-hero{border-top:3px solid var(--type-a-line)}
.type-saver .result-type-badge{background:var(--type-b-bg);color:var(--type-b)}
.type-saver .result-type-name{color:var(--type-b)}
.type-saver .result-hero{border-top:3px solid var(--type-b-line)}
.type-challenger .result-type-badge{background:var(--type-c-bg);color:var(--type-c)}
.type-challenger .result-type-name{color:var(--type-c)}
.type-challenger .result-hero{border-top:3px solid var(--type-c-line)}
.type-architect .result-type-badge{background:var(--type-d-bg);color:var(--type-d)}
.type-architect .result-type-name{color:var(--type-d)}
.type-architect .result-hero{border-top:3px solid var(--type-d-line)}

/* RESPONSIVE */
@media(max-width:375px){
  .container{padding:12px}
  .intro-wrap{padding:36px 16px}
  .intro h1{font-size:22px}
  .intro .stats{gap:8px}
  .intro .stat{padding:12px 14px;min-width:88px}
  .intro .stat .num{font-size:19px}
  .btn-start{padding:16px 40px;font-size:15px}
  .question-card{padding:24px 16px}
  .q-statement{font-size:14.5px;margin-bottom:24px}
  .bipolar-labels{gap:8px;margin-bottom:16px}
  .bipolar-label{font-size:11.5px;padding:11px 8px}
  .neu-btn{width:40px;height:40px}
  .neu-btn.size-lg{width:46px;height:46px}
  .neu-btn.center-neu{width:34px;height:34px}
  .neu-btn.selected .dot{width:16px;height:16px}
  .neu-btn.size-lg.selected .dot{width:20px;height:20px}
  .selector-line{width:8px}
  .selector-tick{font-size:8px}
  .btn-next{padding:14px;font-size:14px}
  .result-cta{padding:20px 16px 28px}
  .result-cta h3{font-size:15px}
  .btn-cta{padding:15px 36px;font-size:14px}
}
@media(min-width:600px){
  .intro{max-width:540px}
  .intro h1{font-size:32px}
  .intro .hook-text{font-size:16px}
  .intro .stat{padding:18px 24px;min-width:120px}
  .intro .stat .num{font-size:24px}
  .q-statement{font-size:18px}
  .bipolar-label{font-size:13.5px;padding:16px 12px}
  .neu-btn{width:50px;height:50px}
  .neu-btn.size-lg{width:56px;height:56px}
  .neu-btn.selected .dot{width:20px;height:20px}
  .neu-btn.size-lg.selected .dot{width:26px;height:26px}
  .selector-line{width:16px}
}
@media(min-width:768px){
  .intro-wrap{padding:60px 32px}
  .intro{max-width:580px}
  .intro h1{font-size:36px}
  .intro .hook-text{font-size:16px;max-width:520px}
  .intro .stats{gap:16px}
  .selector-line{width:20px}
  .selector-tick{font-size:10px}
  .btn-next{padding:18px;font-size:16px;border-radius:14px}
  .insight-card{padding:52px 40px;border-radius:22px}
  .result-card{border-radius:22px}
  .result-hero{padding:48px 40px 40px}
  .result-type-name{font-size:32px}
  .result-body{padding:40px}
  .result-section-body{font-size:15.5px}
  .result-cta{padding:40px 40px 48px}
  .result-cta h3{font-size:18px}
  .btn-cta{padding:19px 52px;font-size:16px;border-radius:14px}
  .btn-start{padding:20px 64px;font-size:17px}
}
.hidden{display:none}
</style>
</head>
<body>

<!-- ===== INTRO ===== -->
<div id="screen-intro" class="intro-wrap">
<div class="intro">
<div class="badge">성공을 디자인하라 — 네이버 카페</div>
<h1>열심히 벌고,<br>열심히 모아도<br><em>부자</em>가 되지 않는 이유</h1>
<div class="accent-line"></div>
<div class="hook-text">
<strong>3분</strong>이면 당신의 부의 그릇을 알 수 있습니다.
</div>
<div class="stats">
<div class="stat"><div class="num">48권</div><div class="label">경제·마인드셋 도서 연구</div></div>
<div class="stat"><div class="num">2년+</div><div class="label">독서토론 운영</div></div>
</div>
<div class="social-proof">48권의 경제·투자·마인드셋 도서와 2년간의 독서토론을 기반으로 설계되었습니다.</div>
<button class="btn-start" onclick="startQuiz()">내 부의 그릇 알아보기</button>
<div class="time-info">11개 질문 · 약 3분 · 완전 무료</div>
</div>
</div>

<!-- ===== QUIZ ===== -->
<div id="screen-quiz" class="hidden">
<div class="container">
<div class="quiz-header">
<div class="progress-text" id="progress-text"></div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

    solution:{program:"습관화 프로젝트",reason:"같은 방향으로 가는 사람들과 함께 100일을 달리면, 혼자일 때보다 속도와 깊이가 달라집니다.",detail:"100일간 매일 인증 | 오프라인 모임 | 완주율 75%"}}
};
let qIndex=0,scores={spender:0,saver:0,challenger:0,architect:0},insightShown=false,currentSelection=null,verificationVal=null;
const totalQuestions=questions.filter(q=>q!==null).length,insightAfterQ=6;
function startQuiz(){gtag('event','wealth_quiz_start');document.getElementById('screen-intro').classList.add('hidden');document.getElementById('screen-quiz').classList.remove('hidden');qIndex=0;scores={spender:0,saver:0,challenger:0,architect:0};insightShown=false;verificationVal=null;showStep();}
function showStep(){
  if(qIndex===insightAfterQ&&!insightShown){showInsightBreak();return;}
  let arrIdx=qIndex<insightAfterQ?qIndex:qIndex+1;
  if(arrIdx>=questions.length||!questions[arrIdx]){showLoadingScreen();return;}
  let q=questions[arrIdx],pct=((qIndex+1)/totalQuestions*100).toFixed(1);
  document.getElementById('progress-text').textContent=`${qIndex+1} / ${totalQuestions}`;
  document.getElementById('progress-fill').style.width=pct+'%';
  currentSelection=null;
  let btnText=getButtonText(qIndex,totalQuestions);
  let html=`<div class="question-card"><div class="q-number">Q${qIndex+1}</div><div class="q-statement">${q.statement}</div><div class="bipolar-area"><div class="bipolar-labels"><div class="bipolar-label" id="label-left">${q.left.replace(/\n/g,'<br>')}</div><div class="bipolar-label" id="label-right">${q.right.replace(/\n/g,'<br>')}</div></div><div class="selector-row"><button class="neu-btn size-lg" data-val="1" onclick="selectVal(this,1)"><span class="dot"></span></button><div class="selector-line"></div><button class="neu-btn" data-val="2" onclick="selectVal(this,2)"><span class="dot"></span></button><div class="selector-line"></div><button class="neu-btn center-neu" data-val="3" onclick="selectVal(this,3)"><span class="dot"></span></button><div class="selector-line"></div><button class="neu-btn right-side" data-val="4" onclick="selectVal(this,4)"><span class="dot"></span></button><div class="selector-line"></div><button class="neu-btn size-lg right-side" data-val="5" onclick="selectVal(this,5)"><span class="dot"></span></button></div><div class="selector-ticks"><div class="selector-tick">매우 그렇다</div><div class="selector-tick">그렇다</div><div class="selector-tick">중간</div><div class="selector-tick">그렇다</div><div class="selector-tick">매우 그렇다</div></div></div><button class="btn-next" id="btn-next" onclick="nextStep()">${btnText}</button></div>`;
  const area=document.getElementById('question-area');area.innerHTML=html;area.dataset.arrIdx=arrIdx;
}
function selectVal(el,val){
  currentSelection=val;
  const r=document.createElement('span');r.classList.add('ripple');const rect=el.getBoundingClientRect();r.style.width=r.style.height=Math.max(rect.width,rect.height)+'px';r.style.left='0px';r.style.top='0px';el.appendChild(r);setTimeout(()=>r.remove(),500);
  document.querySelectorAll('.neu-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');
  document.getElementById('label-left').classList.toggle('active-l',val<=2);document.getElementById('label-right').classList.toggle('active-r',val>=4);document.getElementById('btn-next').classList.add('active');
}
function showInsightBreak(){
  let pct=(insightAfterQ/totalQuestions*100).toFixed(1);document.getElementById('progress-text').textContent='잠깐!';document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('question-area').innerHTML=`<div class="insight-card"><div class="insight-icon">💡</div><div class="insight-title">${insightBreak.title}</div><div class="insight-text">${insightBreak.text.replace(/\n\n/g,'<br><br>')}</div><div class="insight-source">${insightBreak.source}</div><button class="btn-continue" onclick="insightShown=true;showStep()">계속 진단하기</button></div>`;
}
function nextStep(){
  if(!currentSelection)return;let arrIdx=parseInt(document.getElementById('question-area').dataset.arrIdx);
  let q=questions[arrIdx];let s=q.score(currentSelection);Object.keys(s).forEach(k=>scores[k]+=s[k]);
  if(q.isVerification)verificationVal=currentSelection;
  gtag('event','wealth_question_answer',{question_number:qIndex+1,answer_value:currentSelection});
  const card=document.querySelector('.question-card');if(card)card.classList.add('exiting');
  setTimeout(()=>{qIndex++;qIndex>=totalQuestions?showLoadingScreen():showStep();},220);
}
function showLoadingScreen(){document.getElementById('screen-quiz').classList.add('hidden');document.getElementById('screen-loading').classList.remove('hidden');setTimeout(()=>document.getElementById('ls1').classList.add('active'),300);setTimeout(()=>document.getElementById('ls2').classList.add('active'),1200);setTimeout(()=>document.getElementById('ls3').classList.add('active'),2100);setTimeout(()=>{document.getElementById('screen-loading').classList.add('hidden');showResult();},3000);}
function showResult(){
  if(verificationVal!==null&&verificationVal<=2){scores.architect=Math.max(0,scores.architect*0.5);}
  const total=Object.values(scores).reduce((a,b)=>a+b,0)||1,sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]),topKey=sorted[0][0],type=types[topKey],pcts={};
  gtag('event','wealth_quiz_complete',{result_type:type.badge,result_name:type.name});
  sorted.forEach(([k,v])=>pcts[k]=Math.round(v/total*100));
  const mc={spender:'var(--type-a)',saver:'var(--type-b)',challenger:'var(--type-c)',architect:'var(--type-d)'},mn={spender:'소비형',saver:'저축형',challenger:'도전형',architect:'설계형'};
  const typeIcons={
    spender:`<svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="36" cy="36" r="33" stroke="var(--type-a)" stroke-width="2" opacity=".15"/><circle cx="36" cy="36" r="20" stroke="var(--type-a)" stroke-width="1.5" opacity=".3"/><text x="36" y="42" text-anchor="middle" fill="var(--type-a)" font-size="24" font-weight="700">₩</text></svg>`,
    saver:`<svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="36" cy="36" r="33" stroke="var(--type-b)" stroke-width="2" opacity=".15"/><rect x="22" y="28" width="28" height="20" rx="3" stroke="var(--type-b)" stroke-width="2" fill="none"/><line x1="22" y1="35" x2="50" y2="35" stroke="var(--type-b)" stroke-width="1.5"/><circle cx="36" cy="41" r="4" stroke="var(--type-b)" stroke-width="1.5" fill="none"/></svg>`,
    challenger:`<svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="36" cy="36" r="33" stroke="var(--type-c)" stroke-width="2" opacity=".15"/><polyline points="20,50 28,35 36,42 44,25 52,30" stroke="var(--type-c)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><polygon points="50,22 56,28 52,30" fill="var(--type-c)"/></svg>`,
    architect:`<svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="36" cy="36" r="33" stroke="var(--type-d)" stroke-width="2" opacity=".15"/><rect x="24" y="38" width="8" height="14" rx="1" fill="var(--type-d)" opacity=".3"/><rect x="34" y="30" width="8" height="22" rx="1" fill="var(--type-d)" opacity=".5"/><rect x="44" y="22" width="8" height="30" rx="1" fill="var(--type-d)" opacity=".7"/><line x1="20" y1="52" x2="56" y2="52" stroke="var(--type-d)" stroke-width="1.5"/></svg>`
  };
  let metersHtml=sorted.map(([k])=>{let pct=pcts[k],isTop=k===topKey;return`<div class="meter-row"><div class="meter-label" style="color:${isTop?mc[k]:'var(--text-light)'};font-weight:${isTop?700:400}">${mn[k]}</div><div class="meter-bar"><div class="meter-fill" data-width="${pct}" style="background:${mc[k]};opacity:${isTop?1:0.35}"></div></div><div class="meter-pct" style="color:${isTop?mc[k]:'var(--text-light)'}">${pct}%</div></div>`;}).join('');
  let descHtml=type.desc.map(p=>`<p>${p}</p>`).join('');
  let mindsetHtml=type.mindset.current?`<div class="mindset-box"><div class="label">부의 그릇 전환 포인트</div><div class="current">${type.mindset.current}</div><div class="new">${type.mindset.new}</div></div>`:`<div class="mindset-box"><div class="label">당신의 핵심 마인드셋</div><div class="new">${type.mindset.new}</div></div>`;
  const programLinks={spender:'https://cafe.naver.com/sd161921/16388',saver:'https://cafe.naver.com/sd161921/16390',challenger:'https://cafe.naver.com/sd161921/16390',architect:'https://cafe.naver.com/sd161921/16392'};
  const div=document.getElementById('screen-result');div.className=type.color;div.classList.remove('hidden');
  document.getElementById('result-container').innerHTML=`<div class="result-card"><div class="result-hero"><div style="text-align:center;margin-bottom:8px">${typeIcons[topKey]}</div><div class="result-type-badge">${type.badge}</div><div class="result-type-name">${type.name}</div><div class="result-subtitle">${type.subtitle}</div><div class="result-oneliner">${type.oneliner}</div><div style="margin-top:12px;font-size:12px;color:var(--gold);font-weight:600;letter-spacing:0.5px">추천 도서 → ${type.book.name}</div></div><div class="result-body"><div class="result-meter reveal-section">${metersHtml}</div><div class="result-section reveal-section"><div class="result-section-title">당신의 부의 그릇 분석</div><div class="result-section-body">${descHtml}</div>${mindsetHtml}</div><div class="result-section reveal-section"><div class="result-section-title">이 유형이 변화한 사례</div><div class="story-box"><div class="label">실제 사례</div><div class="text">${type.story}</div></div></div><div class="mid-story-cta reveal-section"><div class="mid-label">경제적 자유 이야기</div><div class="mid-title">평범한 월급쟁이는 어떻게<br>경제적 자유를 이뤘을까?</div><div class="mid-desc">월급 250만원에서 시작한 진짜 이야기</div><a href="https://naver.me/F8lL0Y42" target="_blank" class="mid-link" onclick="gtag('event','wealth_mid_story_click',{result_type:'${type.badge}'})">1편 읽기 →</a></div><div class="result-section reveal-section"><div class="result-section-title">당신을 위한 추천 도서</div><div class="book-box"><div class="label">지금 읽어야 할 책</div><div class="book-name">📖 ${type.book.name}</div><div class="book-reason">${type.book.reason}</div><div class="book-next">${type.book.next}</div></div></div><div class="result-section reveal-section"><div class="result-section-title">부의 그릇을 키우는 첫 번째 스텝</div><div class="solution-box"><div class="sol-label">맞춤 추천 프로그램</div><div class="sol-name">${type.solution.program}</div><div class="sol-reason">${type.solution.reason}</div><div class="sol-detail">${type.solution.detail}</div><a href="${programLinks[topKey]}" target="_blank" style="display:inline-block;margin-top:14px;padding:10px 24px;background:var(--gold);color:#fff;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none" onclick="gtag('event','wealth_cta_click',{result_type:'${type.badge}',cta_target:'program_detail'})">프로그램 자세히 보기 →</a></div></div></div></div><div class="result-cta reveal-section"><h3>부의 그릇은 키울 수 있습니다.</h3><a href="https://cafe.naver.com/sd161921/16382" target="_blank" class="btn-cta" onclick="gtag('event','wealth_cta_click',{result_type:'${type.badge}',cta_target:'integrated_landing'})">같은 고민을 가진 사람들이 모인 곳 →</a><div class="share-box" style="margin-top:20px"><div class="share-prompt">이 테스트, 친구도 궁금해할걸요?</div><div style="display:flex;flex-direction:column;gap:8px;margin-top:12px"><button class="btn-cta" onclick="shareQuizInvite('${topKey}')" style="font-size:14px;padding:13px 20px;width:100%">너도 한번 해봐! 👉</button><button class="btn-share" onclick="shareResult('${topKey}')" style="width:100%">📋 내 결과 보내기</button></div></div></div><div class="result-footer">성공을 디자인하라 — 부의 그릇 테스트<br>48권의 경제·투자·마인드셋 도서와 2년간의 독서토론을 기반으로 설계되었습니다.</div></div>`;
  window.scrollTo({top:0,behavior:'smooth'});
  setTimeout(()=>{document.querySelectorAll('.meter-fill').forEach(el=>{el.style.width=el.dataset.width+'%';});},400);
  const observer=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');observer.unobserve(e.target);}});},{threshold:0.12});
  document.querySelectorAll('.reveal-section').forEach(s=>observer.observe(s));
}
function shareQuizInvite(typeKey){gtag('event','wealth_share_click',{share_type:'quiz_invite',result_type:typeKey});const t=types[typeKey],text=`나는 [${t.name}] 나왔어! 너도 해봐 👉 https://superdaddy-161921.github.io/Wealth-Capacity-Test/`;if(navigator.share)navigator.share({title:'부의 그릇 테스트',text,url:'https://superdaddy-161921.github.io/Wealth-Capacity-Test/'}).catch(()=>{});else copyText(text);}
function shareResult(typeKey){gtag('event','wealth_share_click',{share_type:'result_share',result_type:typeKey});const t=types[typeKey],text=`[부의 그릇 테스트 결과]\n${t.badge} — ${t.name}\n"${t.subtitle}"\n\n${t.oneliner}\n\n너도 해봐 👉 https://superdaddy-161921.github.io/Wealth-Capacity-Test/`;if(navigator.share)navigator.share({title:'나는 '+t.name+' 나왔는데, 너는?',text}).catch(()=>{});else copyText(text);}
function copyText(text){if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>showToast('클립보드에 복사되었습니다!')).catch(()=>fallbackCopy(text));else fallbackCopy(text);}
function fallbackCopy(text){const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('클립보드에 복사되었습니다!');}
function showToast(msg){let t=document.getElementById('v10-toast');if(!t){t=document.createElement('div');t.id='v10-toast';t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#1F2937;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:all .3s ease;white-space:nowrap';document.body.appendChild(t);}t.textContent=msg;requestAnimationFrame(()=>{t.style.transform='translateX(-50%) translateY(0)';t.style.opacity='1';});setTimeout(()=>{t.style.transform='translateX(-50%) translateY(80px)';t.style.opacity='0';},2000);}
</script>
